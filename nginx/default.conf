# ============================================================================
#  Hardened nginx vhost for the Server Dashboard
#  Served by nginxinc/nginx-unprivileged:alpine — listens on 8080 as uid 101.
#  This file is copied to /etc/nginx/conf.d/default.conf in the image.
# ============================================================================

server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # Don't leak the nginx version in headers / error pages.
    server_tokens off;

    # Conservative security headers for a same-origin single-page app.
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header Referrer-Policy        "no-referrer"  always;

    # ----------------------------------------------------------------------
    #  Live metrics file. The host collector writes here via a read-only
    #  volume mount (see docker-compose.yml). It must NEVER be cached or the
    #  dashboard would show stale data.
    # ----------------------------------------------------------------------
    location = /data/metrics.json {
        default_type application/json;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
        # 404 (not 403/500) when the collector hasn't produced a file yet,
        # so the frontend cleanly falls back to its embedded snapshot.
        try_files $uri =404;
    }

    # ----------------------------------------------------------------------
    #  The dashboard shell. It is a single static file, but try_files keeps
    #  things resilient if the path is ever requested with a trailing slash.
    # ----------------------------------------------------------------------
    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
}
